<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="styles.css">
    <script type="text/javascript" src="./js/app.js" defer></script>
</head>
<body onload="handler()">
    <div class="header">
        <div class="hidden">
            <button>New Book</button>
        </div>
        <h1>Library</h1>
        <button id="newBookBtn">New Book</button>
    </div>

    <div id = "bookList">
        <div class="bookContainer bookContainerHover" style="align-items: center;">
            <div class="removeBtn" style="opacity: 0; display: none">
                <button>X</button>
            </div>
            <div class="bookObj">
                <div class="bookSpine" style="transform: translate3d(0px, 0px, 0px) scale3d(1, 1, 1) rotateX(0deg) rotateY(0deg) rotateZ(0deg) skew(0deg, 0deg)">
                    <p style="font-size: x-large">Lord of the Flies</p>
                    <img src = "https://books.google.com/books/content?id=iyfgqV5dxXQC&printsec=frontcover&img=1&zoom=10&imgtk=AFLRE73-FYhmf7gV-2VxR7B8QvNtwNXCD23HdgZuKayrSQTooSMyhd12pMx0yWHuuVife4OHSut7ppe5fbyfPmOV--ls48uFtjBtsCLDD3QMPPq9GarNPpQR74qSm6c-s8LU3ZLNUShE">
                </div>
                <div class="bookCover" style="transform: translate3d(0px, 0px, 0px) scale3d(1, 1, 1) rotateX(0deg) rotateY(95deg) rotateZ(0deg) skew(0deg, 0deg); margin-right: -225px; background-image: url(https://books.google.com/books/content?id=iyfgqV5dxXQC&printsec=frontcover&img=1&zoom=10&imgtk=AFLRE73-FYhmf7gV-2VxR7B8QvNtwNXCD23HdgZuKayrSQTooSMyhd12pMx0yWHuuVife4OHSut7ppe5fbyfPmOV--ls48uFtjBtsCLDD3QMPPq9GarNPpQR74qSm6c-s8LU3ZLNUShE);">
                </div>
            </div>
            <div class="bookInfo" style="opacity: 0; display: none">
                <p class="numPages">Number of Pages: 244</p>
                <div class="read">
                    <button class="readBtn" style="background-color: white; color: black">Read</button>
                    <button class="notReadBtn">Not Read</button>
                </div>
            </div>
        </div>


        <div class="bookContainer bookContainerHover" style="align-items: center;">
            <div class="removeBtn" style="opacity: 0; display: none">
                <button>X</button>
            </div>
            <div class="bookObj">
                <div class="bookSpine" style="transform: translate3d(0px, 0px, 0px) scale3d(1, 1, 1) rotateX(0deg) rotateY(0deg) rotateZ(0deg) skew(0deg, 0deg)">
                    <p style= "font-size: x-large">Normal People</p>
                    <img src="http://books.google.com/books/content?id=fQBlDwAAQBAJ&printsec=frontcover&img=1&zoom=10&&source=gbs_api">
                </div>
                <div class="bookCover" style="transform: translate3d(0px, 0px, 0px) scale3d(1, 1, 1) rotateX(0deg) rotateY(95deg) rotateZ(0deg) skew(0deg, 0deg); margin-right: -225px; background-image: url(http://books.google.com/books/content?id=fQBlDwAAQBAJ&printsec=frontcover&img=1&zoom=10&&source=gbs_api);">
                </div>
            </div>
            <div class="bookInfo" style="opacity: 0; display: none">
                <p class="numPages">Number of Pages: 272</p>
                <div class="read">
                    <button class="readBtn" style="background-color: white; color: black">Read</button>
                    <button class="notReadBtn">Not Read</button>
                </div>
            </div>
        </div>
    </div>

    <div id="form-background" style="display: none">
        <p class="form-title">New Book</p>
        <form class="form-inline">
            <div class="input">
                <label for="title">Title:</label>
                <input type="text" id="title" name="title" required>
            </div>
            <div class="input">
                <label for="author">Author:</label>
                <input type="text" id="author" name="author" required>
            </div>
            <div class="input">
                <label for="num_pages">Number of Pages:</label>
                <input type="number" id="num_pages" name="num_pages" required>
            </div>
            <div class="read-question input">
                <p>Read?</p>
                <input type="radio" id="yes" name="read" value="yes">
                <label for="yes">Yes</label>
                <input type="radio" id="no" name="read" value="no">
                <label for="no">No</label>
            </div>
            <div class="form-button">
                <button id="addBook" type="submit">Add Book</button>
            </div>
        </form>
    </div>
    
    
    
</body>
</html>
